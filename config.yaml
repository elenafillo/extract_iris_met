# Set personal details
user: ""                            # Leave blank; will be filled from $USER environment variable
met_extract_author: "Elena Fillola (ef17148)"

# Where to save the txt file summarising progress running the satellite_met_1b1_fixed_v3 script
scripts_text_save_location: "/home/users/{user}/satellite_met_scripts/updates.txt"

# Directory where to process and save world regions
scratch_path: "/work/scratch-pw5/{user}/"

# NAME directory storing the met archive files
met_archive_directory: "/gws/ssde/j25a/name/met_archive/Global/"

# Directory where to save the final joined met file (legacy NetCDF path; kept for backward compatibility)
met_save_directory: "/gws/ssde/j25b/acrg/{user}/satellite_met/"

# NEW: Directory where yearly zarr stores are saved
zarr_save_directory: "/gws/ssde/j25b/acrg/{user}/satellite_met_zarr/"

# NEW: Zarr format version (2 for backward compatibility with zarr 2.18.7, or 3 for newer zarr)
zarr_format: 2

# Directory where the reference footprint for each domain is stored
reference_footprints_directory: "/gws/ssde/j25b/acrg/elenafi/example_footprints"

# NEW: Directory where saved native UM grids are stored
native_grid_directory: "data/"

# CF-convention metadata written into the output zarr stores. Fill in what
# applies to your group; leave any field as "" to omit it from the store
# attributes (it will not be written as an empty attribute).
metadata:
  conventions: "CF-1.10"     # CF conventions version claimed by the output
  institution: ""            # e.g. "University of Bristol, Atmospheric Chemistry Research Group"
  references: ""             # e.g. a DOI or URL documenting the dataset or method
  title: ""                  # optional; auto-generated per domain/year if left empty
  source: ""                 # optional; auto-generated from the UM Mk version if left empty
  comment: ""                # optional; appended to the auto-generated processing comment


# Default edge size for latitude and longitude if not specified per domain
default_edge_size: [100, 100]

domains:
  SA:
    domain_name: "SOUTHAMERICA"
    footprint: "GOSAT-BRAZIL-column_SOUTHAMERICA_201801.nc"
    world_regions_codes: [6, 9, 10, 13]
    # Grid specification (optional; if absent, falls back to footprint mode with default edge sizes)
    grid:
      mode: footprint              # footprint (default) | regular | native
      edge_size_lat: [100, 100]
      edge_size_lon: [85, 100]
    # Example grid specifications for other modes:
    # For regular mode:
    #   mode: regular
    #   lat_bounds: [-25, 15]
    #   lon_bounds: [-75, -30]
    #   dlat: 0.234
    #   dlon: 0.352
    # For native mode:
    #   mode: native
    #   lat_bounds: [-25, 15]
    #   lon_bounds: [-75, -30]
    #   native_grid: majority  # or "latest", "Mk10", etc.
    
  NA:
    domain_name: "NORTHAFRICA"
    footprint: "GOSAT-SAHARA-column_NORTHAFRICA_201611.nc"
    world_regions_codes: [2, 3, 6, 7]
    edge_size_lat: [100,100]
    edge_size_lon: [85, 100]
    
  CHINA:
    domain_name: "CHINA"
    footprint: "GOSAT-CHINA-column_EASTASIA_201605.nc"
    world_regions_codes: [3, 4, 7, 8]

  INDIA:
    domain_name: "INDIA"
    footprint: "GOSAT-INDIA-SAM-column_SOUTHASIA_201503.nc"
    world_regions_codes: [3, 7]

  INDIA_native_manual:
    domain_name: "INDIA_native_manual"
    world_regions_codes: [3, 7]
    grid:
    #For native mode:
      mode: native
      lat_bounds: [-17, 59]
      lon_bounds: [45, 127]