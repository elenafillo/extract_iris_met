name: docs

on:
  push:
    branches: [zarr_stores, main]
    paths:
      - 'docs/**'
      - 'How_Tos/**'
      - 'usage.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow one concurrent deployment; skip queued runs in favour of the latest.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - run: pip install -r docs/requirements.txt

      # -n (nitpicky) surfaces broken cross-references without failing the build.
      - run: sphinx-build -b html -n docs docs/_build/html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
